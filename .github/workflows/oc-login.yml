name: OC Login

on:
  workflow_dispatch:
    inputs:
      oc-server:
        description: OpenShift server URL
        required: true
      oc-namespace:
        description: OpenShift namespace
        required: true

jobs:
  oc-login:
    runs-on: ubuntu-latest
    steps:
      - name: Install oc
        uses: redhat-actions/openshift-tools-installer@v1.13.1
        with:
          oc: "4.14"

      - name: OC Login
        env:
          OC_SERVER: ${{ inputs.oc-server }}
          OC_TOKEN: ${{ secrets.OC_TOKEN }}
          OC_NAMESPACE: ${{ inputs.oc-namespace }}
        run: |
          echo "Public IP: $(curl -s https://checkip.amazonaws.com)"

          PORT=$(echo "$OC_SERVER" | grep -oP '(?<=:)\d+(?=[/]|$)' || echo "443")
          echo "Capturing on port: $PORT"

          sudo tcpdump -i any -w /tmp/oc-login.pcap -s 0 "tcp port $PORT" &
          TCPDUMP_PID=$!
          trap 'sudo kill "$TCPDUMP_PID" 2>/dev/null; wait "$TCPDUMP_PID" 2>/dev/null' EXIT
          sleep 1

          TOKEN_RESPONSE=$(curl -sk -X POST \
            "${OC_SERVER}/api/v1/namespaces/${OC_NAMESPACE}/serviceaccounts/ghactions/token" \
            -H "Authorization: Bearer ${OC_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"spec": {"expirationSeconds": 600}}')

          OC_TEMP_TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.status.token')

          if [[ -z "$OC_TEMP_TOKEN" || "$OC_TEMP_TOKEN" == "null" ]]; then
            echo "Failed to obtain temp token:"
            echo "$TOKEN_RESPONSE"
            exit 1
          fi

          oc login --token="${OC_TEMP_TOKEN}" --server="${OC_SERVER}"

      - name: Upload pcap
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: oc-login-pcap
          path: /tmp/oc-login.pcap
          retention-days: 3
